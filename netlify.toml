###############################################################################
# Netlify deployment configuration for THE 4 SEASON STUDIO
#
# The Lovable preview uses TanStack Start (SSR on Cloudflare Workers).
# For Netlify we run a dedicated client-only Vite build (vite.spa.config.ts)
# that emits a real static `index.html` + hashed assets in `dist/spa/`.
#
# Notes:
# - Dependency install is handled by Netlify automatically using
#   `package-lock.json` + npm (Node version pinned by `.nvmrc`).
# - `legacy-peer-deps` is configured in `.npmrc` so it always applies.
# - We do NOT re-run `npm install` in the build command (it would slow
#   the build and can clash with Netlify's pre-install phase).
###############################################################################

[build]
  command = "npx vite build --config vite.spa.config.ts"
  publish = "dist/spa"

[build.environment]
  # Force npm — prevents Netlify from auto-detecting bun.lockb and bailing
  # because bun isn't installed by default in the build image.
  NETLIFY_USE_PNPM = "false"
  NETLIFY_USE_YARN = "false"

###############################################################################
# SPA fallback — every unknown route serves index.html so the client router
# (TanStack Router) takes over. Without this, refreshing /shop or /portfolio
# returns 404 from Netlify's static host.
###############################################################################

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

###############################################################################
# Long-cache hashed static assets produced by Vite
###############################################################################

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

###############################################################################
# Security headers
###############################################################################

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
