###############################################################################
# Netlify deployment configuration for THE 4 SEASON STUDIO
#
# This project is built with TanStack Start. The official Netlify Vite plugin
# (@netlify/vite-plugin-tanstack-start) is registered in vite.config.ts and
# wires the SSR handler into a Netlify Function automatically — so deep links,
# refreshes, and per-route metadata all work out of the box.
#
# Just point Netlify at this repo (Build command + Publish directory below)
# and click Deploy. Nothing else is required.
###############################################################################

[build]
  command   = "npm install && npm run build"
  publish   = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

###############################################################################
# Long-cache hashed static assets produced by Vite
###############################################################################

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

###############################################################################
# Baseline security headers
###############################################################################

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
