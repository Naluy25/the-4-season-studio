###############################################################################
# Netlify deployment configuration for THE 4 SEASON STUDIO
#
# This project is built with TanStack Start (Vite). For Netlify we deploy
# the static client build and rely on SPA fallback so that all routes
# (e.g. /shop, /portfolio, /packages...) work on direct visit & refresh.
###############################################################################

[build]
  # Install deps, build the client bundle, then generate a static SPA index.html
  # so Netlify can serve the app as a static site.
  command   = "npm install && npm run build && node scripts/generate-spa-html.mjs"
  # TanStack Start / Vite outputs the client assets to dist/client
  publish   = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

###############################################################################
# SPA fallback — every unknown route serves index.html so the client router
# (TanStack Router) can take over. Without this, refreshing on /shop or
# /portfolio would return 404 from Netlify's static host.
###############################################################################

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

###############################################################################
# Long-cache static assets (hashed filenames produced by Vite)
###############################################################################

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

###############################################################################
# Security headers
###############################################################################

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
